name = "rvy/rodeo"
version = "1.1.0-rc.2"
description = "Lune client for rodeo — execute Luau in Roblox Studio over the rodeo gRPC API"
authors = ["rvy"]
license = "MIT"

includes = [
  "pesde.toml",
  "README.md",
  "LICENSE",
  "src/**/*.luau",
]

[engines]
pesde = "^0.7.2"
lune = "^0.10.4"

[target]
environment = "lune"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"
