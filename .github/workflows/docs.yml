name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rodeo-cli/src/cli.rs'         # CLI surface changes regenerate cli.md
      - 'rodeo-cli/src/lib.rs'
      - 'rodeo-cli/examples/docs-gen.rs'
      - 'rodeo-cli/Cargo.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Regenerate cli.md from the clap definitions and diff against the
      # committed copy. A non-zero diff means someone changed a flag without
      # running `cargo run --example docs-gen > docs/src/content/docs/cli.md`.
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate CLI reference + check for drift
        run: |
          cargo run --example docs-gen > docs/src/content/docs/cli.md
          git diff --exit-code -- docs/src/content/docs/cli.md \
            || (echo "::error::cli.md is stale. Run 'cargo run --example docs-gen > docs/src/content/docs/cli.md' and commit." && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json
      - run: cd docs && npm ci
      - run: cd docs && npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
